version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: datasphere-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - datasphere-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: datasphere-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/datasphere
      - JWT_SECRET=datasphere_super_secret_key_2024
      - JWT_EXPIRE=7d
      - NODE_ENV=production
      - CLIENT_URL=http://localhost
    depends_on:
      - mongo
    networks:
      - datasphere-network
    volumes:
      - ./backend/src/logs:/app/src/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: datasphere-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - datasphere-network

networks:
  datasphere-network:
    driver: bridge

volumes:
  mongo-data: